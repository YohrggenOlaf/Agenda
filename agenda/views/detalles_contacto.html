<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles del Contacto</title>
</head>
<body>

    <h1>Detalles del contacto</h1>

    <label for="id_contacto">ID:</label>
    <input type="text" id="id_contacto" name="id_contacto" value="1" readonly><br><br>

    <label for="nombre">Nombre:</label>
    <input type="text" id="nombre" name="nombre" value="Mark" readonly><br><br>

    <label for="primer_apellido">Primer Apellido:</label>
    <input type="text" id="primer_apellido" name="primer_apellido" value="Otto" readonly><br><br>

    <label for="segundo_apellido">Segundo Apellido:</label>
    <input type="text" id="segundo_apellido" name="segundo_apellido" value="Pérez" readonly><br><br>

    <label for="telefono">Teléfono:</label>
    <input type="tel" id="telefono" name="telefono" value="555-123-4567" readonly><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" value="mark@email.com" readonly><br><br>

    <a href="/borrar"><button type="button">Borrar</button></a>
    <a href="/editar"><button type="button">Editar</button></a>
    <a href="/lista"><button type="button">Regresar</button></a>

</body>
</html>
